body:
  text: 袁嵩宜都山川記江水東過秭歸縣南屈原有賢秭間原放逐亦來歸喻令自寬全鄉人冀其見從因名曰秭歸即離騷所謂女嬃嬋媛以詈余也水經注秭歸蓋楚子熊繹之始國而屈原之鄉里也屈原宅於今具存父老傳言原既流放忽然暫歸鄉人喜悅因名曰歸鄉抑其山秀水清故出俊異地嶮流疾故具性亦隘詩云惟嶽降神生甫及申信與並同上峽中猿鳴至清諸山谷傳其響泠泠不絶行者歌之曰巴東三峽猿鳴悲猿鳴三聲淚沾衣類聚宜都山絶崖壁立數百丈有一火燼插其崖間望可長數尺傳云堯洪水人泊船此旁爨餘故曰插竈御覽自蜀至流頭灘五千餘里下水五日上水百日也渡流頭灘十里便得宜昌縣東徑狼尾灘而歷人灘二灘相去二里人灘水至峻峭南岸有青石夏沒冬出其石嶔崟數十步中悉作人面形或大或小其分明者鬚髮皆具因名曰人灘也並水經注自峽口沂江百許里至黃牛灘南岸有重山山嶺有石壁上有人負刀牽黃牛人迹所絶莫得究焉類聚自黃牛灘東入西陵界至峽口一百許里山水紆曲而兩岸高山重嶂非日中夜半不見日月絶壁或千許丈其石彩色形容多所象類林木高茂略盡冬春猿鳴至清山谷傳響泠泠不絶所謂三峽此其一也水經注自西陵北行十三里有石穴名馬穴嘗有白馬出食人逐之入穴潛出漢中人失馬亦嘗出穴相去數里御覽自西陵東北陸行百二十里有方山其嶺四方素崖如壁天晴朗時有黃影似人像山上有神祠場特生一竹茂好其標垂場中場中有塵埃則風起動此竹拂去如灑掃者類聚對西陵江南岸有山其峰孤秀自山南至嶺俯臨大江如縈帶視舟船如鳧鴈初學記江北多連山登之望江南諸山數十百重莫識其名高者千仞多奇形異勢自非煙褰雨霽不辨見此奇山矣水經注郡城即陸抗攻步闡拒晉於此壘寰宇記大江清濁分流其水十丈見底視魚遊如乘空淺處多五色石南崖有山名荊門北崖有山名虎牙二山相對其荊門山在南上合而下空徹山南有像門也並御覽虎牙山有石壁其色黃間有白文亦有牙齒形寰宇記郡西北三十里有丹山天晴山嶺忽有霧起回轉如煙不過再朝雨必降御覽佷山縣東有溫泉注大溪夏才暖冬則大熱上常有霧氣百病久疾入此水多愈初學記佷山縣東六十里有山名下魚城四面絶崖唯雨道可上皆嶮峻山上周回可二十里有林木池水民田種於山上昔永嘉亂土人登此避賊賊守之經年食盡取池魚擲下與賊以示不窮賊遂退散因此名為下魚城同上佷山山谷之內有石穴穴出清泉下有神魚大者二尺小者一尺釣者先請多少拜而請之數滿便止水側有異花欲摘之者亦如魚請又有異木名千歲木葉似棗冬夏青青復有蒼范溪相近御覽佷山縣方室有靈祠祠中有特生一竹壇美高危其杪下垂忽有塵穢起風動竹拂蕩如掃同上佷山縣北有石穴平居無水有渴者至誠請乞輒得戲乞則不得書鈔佷山縣南岸有溪名長陽此溪數異上重山岡嶺回曲有射堂村東六七里有石穴清泉流三十步便入穴中即當陽溪源也亭下村有石穴甚深未曾測其遠近穴中有蝙蝠大如鳥多倒懸並同上亭下村有淵淵有神龍每旱百姓輒以𦱌草投淵上流魚死龍怒應時大雨御覽夷水又東徑石室作層巖之上石室南向水出其下縣崖千仞自水上徑望見每有陟山嶺者扳木側足而行莫知其誰村人駱都小時到此室邊採蜜見一仙人坐石床上見都凝矚不轉都還招鄉人同往則不復見鄉人今名為仙人室都孫昔尚存水經注自鹽水西北行五十餘里有一山獨立峻絶名為難留城從西面上里餘得石穴行百許步得石磧有二文石並在穴中書鈔宜陽山有風井穴大如甕夏出冬入有樵人置笠穴口風吸之入後於長陽溪口得笠則知潛通焉御覽登句將山見馬鬣建鼓嶷然半天登句將北見高斧山嶷然半天並寰宇記登句將山南望見宜都江陵近在目前沮潭漢諸山嵎嵎時見遠眺雲夢之渾晶然與天際回顧總視衆山數千仞者森然羅列於足下千仞以還者𡾋嵬如邱浪勢焉今在上洛縣西北御覽縣去山四十里別從狼尾灘下南崖初學記
